body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;padding-bottom:60px;}
.ebanner{display:none;background:#fff7ed;border-bottom:2px solid #f97316;padding:7px 24px;font-size:12px;color:#ea580c;font-weight:600;align-items:center;gap:8px;}
.ebanner.show{display:flex;}
.hdr{background:var(--hdr);color:#fff;padding:13px 24px;display:flex;align-items:center;gap:12px;}
.logo{width:33px;height:33px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
.ht h1{font-size:14px;font-weight:700;}
.ht p{font-size:10px;color:#94a3b8;font-family:'DM Mono',monospace;}
.hr{margin-left:auto;}
.upd{font-size:10px;color:#64748b;font-family:'DM Mono',monospace;}
.tb{background:var(--wh);border-bottom:1px solid var(--bd);padding:8px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:20;box-shadow:var(--sh);}
.sw{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:0 8px;flex:1;min-width:120px;max-width:240px;}
.sw input{background:none;border:none;outline:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--tx);padding:6px 0;width:100%;}
.sw input::placeholder{color:var(--mu);}
.fbs{display:flex;gap:4px;flex-wrap:wrap;}
.fb{padding:4px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--wh);font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--mu);transition:all .15s;}
.fb:hover{border-color:var(--ac);color:var(--ac);}
.fb.on{background:var(--ac);border-color:var(--ac);color:#fff;}
.cnt{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;}
.tbr{margin-left:auto;display:flex;gap:6px;}
.bet{padding:5px 12px;border-radius:6px;border:1.5px solid var(--bd);background:var(--wh);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--mu);display:flex;align-items:center;gap:5px;transition:all .15s;}
.bet:hover{border-color:#f97316;color:#f97316;}
.bet.act{background:#fff7ed;border-color:#f97316;color:#ea580c;}
.bex{padding:5px 12px;border-radius:6px;border:1.5px solid #10b981;background:#ecfdf5;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:#059669;display:flex;align-items:center;gap:5px;}
.bex:hover{background:#d1fae5;}
.main{padding:16px 24px;max-width:1100px;}
.slbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin:22px 0 8px;display:flex;align-items:center;gap:7px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--bd);}
.alist{display:flex;flex-direction:column;gap:5px;}
.ai{background:var(--wh);border:1px solid var(--bd);border-radius:9px;overflow:hidden;box-shadow:var(--sh);transition:box-shadow .15s;}
.ai:hover{box-shadow:var(--sh2);}
.ai.hidden{display:none;}
.ai.eon{border-color:#fed7aa;}
.ah{display:flex;align-items:center;gap:7px;padding:10px 13px;cursor:pointer;user-select:none;background:var(--wh);border:none;width:100%;text-align:left;transition:background .12s;}
.ah:hover{background:#f8fafc;}
.cv{width:16px;height:16px;flex-shrink:0;color:var(--mu);transition:transform .32s cubic-bezier(.4,0,.2,1);}
.ai.open .cv{transform:rotate(90deg);}
.an{font-weight:600;font-size:13px;flex:1;color:var(--tx);}
.nt{font-size:10px;color:var(--mu);}
.ic{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:2px 6px;}

.bdg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.bdg.monthly{background:var(--mg);color:var(--mc);}
.bdg.mook{background:var(--sk);color:var(--sc);}
.bdg.seasonal{background:var(--sg);color:var(--sgc);}
.bsrch{display:inline-flex;align-items:center;gap:3px;background:#f1f5f9;border:1px solid var(--bd);color:var(--mu);font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;cursor:pointer;text-decoration:none;white-space:nowrap;transition:all .15s;flex-shrink:0;}

.ab{height:0;overflow:hidden;transition:height .35s cubic-bezier(.4,0,.2,1);}
.bin{border-top:1px solid var(--blt);background:#fafbfd;}

.empty-state{padding:16px;text-align:center;font-size:12px;color:var(--mu);}
table{width:100%;border-collapse:collapse;}
thead th{padding:6px 11px;font-size:10px;font-weight:600;color:var(--mu);text-align:left;background:#f1f5f9;border-bottom:1px solid var(--bd);letter-spacing:.04em;}
tbody tr{border-bottom:1px solid var(--blt);transition:background .1s;}

tbody tr:hover{background:var(--hov);}

.ti{font-weight:500;color:var(--tx);font-size:13px;}
.tu a{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);text-decoration:none;white-space:nowrap;}

.tu a.ml{color:#d97706;}

.bmo{display:inline-flex;align-items:center;gap:3px;background:#d97706;color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;text-decoration:none;white-space:nowrap;}

.ic2{width:210px;}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const SK='dmag_v3';
let DATA=load(),eMode=false,cur='all',pcb=null;
const opened=new Set();
function load(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):JSON.parse(JSON.stringify(DD));}catch{return JSON.parse(JSON.stringify(DD));}}
function save(){localStorage.setItem(SK,JSON.stringify(DATA));document.getElementById('ul').textContent='更新: '+new Date().toLocaleDateString('ja-JP');}
function resetData(){if(!confirm('初期データに戻しますか？'))return;DATA=JSON.parse(JSON.stringify(DD));localStorage.removeItem(SK);render();}

// ══════════════════════════════════════════════
//  URL HELPERS
// ══════════════════════════════════════════════
const B='https://dmagazine.docomo.ne.jp';
const vU=c=>`${B}/view/?cid=${c}&cti=&cc=1000&return_url=%2Fitem%2F${c}%2F1000%2F`;
const iU=c=>`${B}/item/${c}/1000/`;
const mU=h=>`${B}/media/${h}/`;
const gU=n=>`https://www.google.com/search?q=site:dmagazine.docomo.ne.jp+${encodeURIComponent(n)}`;
const ICO=`<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
const LBL={monthly:'月刊',seasonal:'季刊/不定期',mook:'ムック'};

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function mkRow(iss,mi,ii){
  const del=eMode?`<button class="drbtn" onclick="delI(${mi},${ii})">✕</button> `:'';
  if(iss.m){const u=mU(iss.m),sh='/media/'+iss.m.slice(0,10)+'…/';return `<tr><td class="ti">${iss.l}<span class="tmedia">Media</span></td><td class="tu"><a href="${u}" class="ml" target="_blank">${sh}</a></td><td>${del}<a class="bmo" href="${u}" target="_blank">${ICO}Mediaページ</a></td></tr>`;}
  const u=iU(iss.c),sh='/item/'+iss.c.slice(0,10)+'…/1000/';
  return `<tr><td class="ti">${iss.l}</td><td class="tu"><a href="${u}" target="_blank">${sh}</a></td><td>${del}<a class="bv" href="${vU(iss.c)}" target="_blank">${ICO}今すぐ読む</a></td></tr>`;
}
function mkAddRow(mi){return `<tr class="air"><td colspan="3"><div class="aif"><input class="il" id="l${mi}" type="text" placeholder="例: 2026年7月号"><input class="ic2" id="c${mi}" type="text" placeholder="cid または mediaHash"><label><input type="checkbox" id="im${mi}"> Mediaページ</label><button class="bai" onclick="addI(${mi})">＋ 追加</button></div></td></tr>`;}
function mkBody(m,mi){
  if(m.i.length===0){
    return `<div class="bin"><div class="empty-state">配信中の号のItem URLが未取得です。<br>「🔍 最新号を検索」ボタンで最新号のURLを確認し、編集モードで追加してください。</div></div>`;
  }
  const rows=m.i.map((iss,ii)=>mkRow(iss,mi,ii)).join('');
  return `<div class="bin"><table><thead><tr><th>号数</th><th>📎 Item/MediaページURL（クリックで開く）</th><th>${eMode?'操作':'ビューアを開く'}</th></tr></thead><tbody>${rows}${mkAddRow(mi)}</tbody></table></div>`;
}
function mkItem(m,mi){
  const note=m.note?`<span class="nt">— ${m.note}</span>`:'';
  const isO=opened.has(m.n);
  const cnt=m.i.length;
  const cntEl=cnt===0?`<span class="ic0">URL未取得</span>`:`<span class="ic">${cnt}件</span>`;
  return `<div class="ai${eMode?' eon':''}${isO?' open':''}" data-t="${m.t}" data-n="${m.n.toLowerCase()}" id="ai${mi}">
    <button class="ah" onclick="tog(this)">
      <svg class="cv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      <span class="an">${m.n}</span>${note}<span class="bdg ${m.t}">${LBL[m.t]}</span>${cntEl}
      <a class="bsrch" href="${gU(m.n)}" target="_blank" onclick="event.stopPropagation()">🔍 最新号を検索</a>
    </button>
    <div class="ab"${isO?' style="height:auto"':''}>${mkBody(m,mi)}</div>
  </div>`;
}
function render(){
  const secs=[{l:'月刊誌',t:'monthly'},{l:'季刊・不定期刊',t:'seasonal'},{l:'ムック・特別号（単発）',t:'mook'}];
  document.getElementById('mc').innerHTML=secs.map(s=>`<div class="slbl">${s.l}</div><div class="alist">${DATA.map((m,i)=>m.t===s.t?mkItem(m,i):'').join('')}</div>`).join('');
  fil();
}

// ══════════════════════════════════════════════
//  ACCORDION
// ══════════════════════════════════════════════
function tog(btn){
  const item=btn.closest('.ai'),body=item.querySelector('.ab'),name=item.querySelector('.an').textContent;
  const isO=item.classList.contains('open');
  if(isO){body.style.height=body.scrollHeight+'px';item.classList.remove('open');opened.delete(name);requestAnimationFrame(()=>requestAnimationFrame(()=>{body.style.height='0';}));}
  else{item.classList.add('open');opened.add(name);body.style.height=body.scrollHeight+'px';body.addEventListener('transitionend',function h(){if(item.classList.contains('open'))body.style.height='auto';body.removeEventListener('transitionend',h);});}
}

// ══════════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════════
function sf(t,btn){cur=t;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');fil();}
function fil(){const q=document.getElementById('si').value.toLowerCase().trim();let n=0;document.querySelectorAll('.ai').forEach(el=>{const ok=(cur==='all'||el.dataset.t===cur)&&(!q||el.dataset.n.includes(q));el.classList.toggle('hidden',!ok);if(ok)n++;});document.getElementById('cl').textContent=n+' 件表示中';}

// ══════════════════════════════════════════════
//  EDIT
// ══════════════════════════════════════════════
function toggleEdit(){eMode=!eMode;const btn=document.getElementById('et'),banner=document.getElementById('eb');btn.classList.toggle('act',eMode);btn.textContent=eMode?'✕ 編集終了':'✏️ 編集';banner.classList.toggle('show',eMode);render();}
function addI(mi){const l=document.getElementById(`l${mi}`).value.trim(),c=document.getElementById(`c${mi}`).value.trim(),isM=document.getElementById(`im${mi}`).checked;if(!l||!c){alert('号数とcidを入力してください');return;}DATA[mi].i.unshift(isM?{l,m:c}:{l,c});save();render();}
function delI(mi,ii){const iss=DATA[mi].i[ii];openConf(`「${iss.l}」を削除しますか？`,()=>{DATA[mi].i.splice(ii,1);save();render();});}
function openConf(msg,cb){document.getElementById('cmsg').textContent=msg;document.getElementById('cm').classList.add('show');pcb=cb;}
function doConfirm(){if(pcb)pcb();pcb=null;closeM();}
function closeM(){document.getElementById('cm').classList.remove('show');}
document.getElementById('cm').addEventListener('click',e=>{if(e.target===document.getElementById('cm'))closeM();});

// ══════════════════════════════════════════════
//  EXPORT
// ══════════════════════════════════════════════
function exportHTML(){
  const dj=JSON.stringify(DATA,null,2),td=new Date().toISOString().slice(0,10);
  const src=document.documentElement.outerHTML.replace(/const DD = \[[\s\S]*?\];\n/,`const DD = ${dj};\n`).replace(/更新: [\d\-]+/g,`更新: ${td}`);
  const b=new Blob([src],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='index.html';a.click();URL.revokeObjectURL(a.href);
}
render();
</script>
